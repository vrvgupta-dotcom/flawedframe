<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Flawed Frame — Archive</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b09;
    --card: #1c1a16;
    --ink: #f0ede8;
    --ink-50: rgba(240,237,232,0.50);
    --ink-45: rgba(240,237,232,0.45);
    --ink-40: rgba(240,237,232,0.40);
    --ink-35: rgba(240,237,232,0.35);
    --ink-30: rgba(240,237,232,0.30);
    --ink-25: rgba(240,237,232,0.25);
    --ink-20: rgba(240,237,232,0.20);
    --ink-15: rgba(240,237,232,0.15);
    --ink-12: rgba(240,237,232,0.12);
    --ink-08: rgba(240,237,232,0.08);
    --ink-06: rgba(240,237,232,0.06);
    --gold: #c9a84c;
    --gold-veil: rgba(201,168,76,0.08);
    --display: "Cormorant Garamond", "EB Garamond", Georgia, serif;
    --sans: "Outfit", "Helvetica Neue", Arial, sans-serif;
    --mono: "DM Mono", ui-monospace, "SFMono-Regular", monospace;
    --ease: cubic-bezier(.2,.7,.2,1);
    --nav-h: 72px;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: rgba(201,168,76,0.30); color: var(--ink); }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  .wrap { width: 100%; max-width: 1320px; margin: 0 auto; padding: 0 56px; }
  @media (max-width: 800px) { .wrap { padding: 0 22px; } }

  /* ---------- NAV (identical to homepage) ---------- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(11,11,9,0.92);
    backdrop-filter: blur(12px) saturate(120%);
    -webkit-backdrop-filter: blur(12px) saturate(120%);
    border-bottom: 0.5px solid var(--ink-12);
    height: var(--nav-h);
  }
  .nav-inner {
    height: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 56px;
  }
  @media (max-width: 800px) { .nav-inner { padding: 0 22px; } }
  .nav-logo {
    height: 36px; width: auto; display: block;
    opacity: 0.92;
  }
  .nav-links {
    display: flex; gap: 32px;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .nav-links a { opacity: 0.5; transition: opacity 200ms ease; }
  .nav-links a:hover { opacity: 1; }
  .nav-links a.is-active { opacity: 1; }
  @media (max-width: 540px) { .nav-links { gap: 20px; } .nav-logo { height: 28px; } }

  /* ---------- PAGE HEADER ---------- */
  .page-head {
    padding-top: calc(var(--nav-h) + 80px);
    padding-bottom: 56px;
  }
  .page-head h1 {
    font-family: var(--display);
    font-weight: 300;
    font-size: 72px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--ink);
  }
  .page-head .lede {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink);
    opacity: 0.40;
    margin: 18px 0 0;
    max-width: 480px;
  }
  @media (max-width: 600px) {
    .page-head h1 { font-size: 56px; }
  }

  /* ---------- SERIES BLOCK ---------- */
  .series-block {
    padding: 52px 0;
    border-top: 0.5px solid var(--ink-06);
  }
  .series-block:last-of-type {
    border-bottom: 0.5px solid var(--ink-06);
  }

  .series-row1 {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 32px;
    margin-bottom: 28px;
  }
  .series-row1 .name {
    font-family: var(--display);
    font-weight: 300;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.005em;
    color: var(--ink);
    opacity: 0.45;
    margin: 0;
  }
  .series-row1 .meta {
    text-align: right;
    line-height: 1;
  }
  .series-row1 .meta .date {
    font-family: var(--mono);
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--ink);
    opacity: 0.20;
    white-space: nowrap;
  }
  .series-row1 .meta .count {
    margin-top: 10px;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.20;
  }
  @media (max-width: 540px) {
    .series-row1 .name { font-size: 24px; }
  }

  /* ---------- THUMB STRIP ---------- */
  .thumb-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  @media (max-width: 900px) {
    .thumb-strip { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 480px) {
    .thumb-strip { grid-template-columns: repeat(2, 1fr); }
  }

  .thumb {
    display: block;
  }
  .thumb-media {
    position: relative;
    aspect-ratio: 4 / 3;
    border-radius: 2px;
    overflow: hidden;
    border: 0.5px solid var(--ink-06);
    background: #1c1a16;
  }
  .thumb-media .img {
    position: absolute; inset: 0;
    background: #1c1a16;
    opacity: 0.35;
    transition: opacity 300ms ease;
  }
  /* faint texture so it doesn't read as a perfect rectangle */
  .thumb-media .img::after {
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 6px);
  }
  .thumb-media .veil {
    position: absolute; inset: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  .thumb.is-sold .veil {
    background: var(--gold-veil);
  }
  .thumb.is-unsold .veil {
    background: rgba(126,184,212,0.025); /* slightly cooler */
  }
  .thumb:hover .img { opacity: 0.55; }

  .thumb-title {
    margin-top: 12px;
    font-family: var(--display);
    font-weight: 400;
    font-size: 12px;
    line-height: 1.2;
    color: var(--ink);
    opacity: 0.30;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---------- EMPTY STATE ---------- */
  .empty {
    min-height: 50vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    padding: 80px 0;
  }
  .empty p {
    font-family: var(--display);
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    color: var(--ink);
    opacity: 0.25;
    margin: 0;
  }

  /* ---------- RUNNING TOTAL ---------- */
  .total {
    border-top: 0.5px solid var(--ink-06);
    padding: 24px 0;
    text-align: center;
  }
  .total p {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 12px;
    color: var(--ink);
    opacity: 0.25;
    margin: 0;
  }

  /* ---------- THUMB CLICK ---------- */
  .thumb { cursor: pointer; }
  .thumb:focus-visible .thumb-media { outline: 1px solid var(--ink-30); outline-offset: 2px; }
  .thumb:hover .thumb-title { opacity: 0.55; }

  /* ---------- MODAL (matches homepage) ---------- */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(11,11,9,0.88);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    opacity: 0;
    animation: modalFade 240ms ease forwards;
  }
  @keyframes modalFade { to { opacity: 1; } }
  .modal {
    width: 100%;
    max-width: 900px;
    background: var(--card);
    border: 0.5px solid var(--ink-12);
    border-radius: 2px;
    position: relative;
    display: grid;
    grid-template-columns: 55fr 45fr;
    max-height: calc(100vh - 64px);
    overflow: hidden;
    transform: translateY(8px);
    opacity: 0;
    animation: modalIn 320ms var(--ease) 80ms forwards;
  }
  @keyframes modalIn { to { transform: none; opacity: 1; } }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px;
    border: 0.5px solid var(--ink-15);
    border-radius: 2px;
    color: var(--ink);
    opacity: 0.6;
    background: none; cursor: pointer;
    font: inherit;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
    transition: opacity 200ms ease, border-color 200ms ease;
    font-size: 14px; line-height: 1;
  }
  .modal-close:hover { opacity: 1; border-color: var(--ink-30); }
  .modal-media {
    position: relative;
    background: #14130f;
    min-height: 360px;
    overflow: hidden;
  }
  .modal-media .img {
    position: absolute; inset: 0;
    background: #1c1a16;
    opacity: 0.40;
  }
  .modal-media .img::after {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 6px);
  }
  .modal-media .veil { position: absolute; inset: 0; pointer-events: none; }
  .modal-media.is-sold .veil   { background: var(--gold-veil); }
  .modal-media.is-unsold .veil { background: rgba(126,184,212,0.025); }
  .modal-inscription {
    position: absolute; left: 20px; bottom: 16px;
    font-family: var(--mono); font-style: italic;
    font-size: 12px; letter-spacing: 0.02em;
    color: rgba(240,237,232,0.55);
    z-index: 1;
  }
  .modal-body {
    padding: 36px;
    display: flex; flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }
  .series-line {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.30;
  }
  .m-title {
    font-family: var(--display);
    font-weight: 400;
    font-size: 34px;
    letter-spacing: -0.005em;
    line-height: 1.1;
    margin: -4px 0 0;
  }
  .edition-line {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.30;
  }
  .desc {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 13px;
    line-height: 1.9;
    color: var(--ink);
    opacity: 0.55;
    margin: 0;
  }
  .modal-divider { height: 0; border-top: 0.5px solid var(--ink-12); margin: 6px 0; }
  .status-block {
    display: flex; flex-direction: column; gap: 8px;
  }
  .status-pill {
    align-self: flex-start;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 6px 10px;
    border: 0.5px solid currentColor;
    color: var(--gold);
    border-radius: 2px;
    line-height: 1;
    white-space: nowrap;
  }
  .status-pill.unsold { color: rgba(126,184,212,0.85); }
  .status-detail {
    font-family: var(--display);
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--ink);
    opacity: 0.55;
    line-height: 1.5;
  }
  .archived-note {
    font-family: var(--mono);
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.25;
    text-align: center;
    padding: 12px;
    border: 0.5px dashed var(--ink-12);
    border-radius: 2px;
  }

  @media (max-width: 720px) {
    .modal { grid-template-columns: 1fr; max-height: calc(100vh - 32px); overflow-y: auto; }
    .modal-media { min-height: 0; aspect-ratio: 4 / 3; }
  }

  body.modal-open { overflow: hidden; }

  /* ---------- FOOTER (identical to homepage) ---------- */
  footer { padding: 60px 0 28px; }
  .foot-top {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 32px; flex-wrap: wrap;
    padding-bottom: 32px;
    border-bottom: 0.5px solid var(--ink-08);
  }
  .foot-brand { line-height: 1.1; }
  .foot-brand img { height: 38px; opacity: 0.4; }
  .foot-brand .tag {
    margin-top: 8px;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.20;
  }
  .foot-links {
    display: flex; gap: 28px;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.30;
  }
  .foot-links a:hover { opacity: 1; color: var(--ink); }
  .foot-bottom {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    padding-top: 20px;
    font-family: var(--sans);
    font-weight: 300;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.18;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="archive.jsx"></script>
</body>
</html>
